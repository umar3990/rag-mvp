services:
  # pgvector/pgvector ships Postgres with the `vector` extension already
  # compiled in, so we don't need to install pgvector by hand.
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: rag_mvp
      POSTGRES_PASSWORD: rag_mvp
      POSTGRES_DB: rag_mvp_development
    ports:
      # host 5433 -> container 5432: 5432 is already taken by another
      # project's Postgres container on this machine.
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # Thin trigger/relay only -- watches Gmail, calls Rails' webhook; all
  # decision logic stays in Rails, not in n8n's workflow config. See
  # docs/n8n-gmail-setup.md for the one-time manual setup (Google Cloud
  # OAuth client, the actual workflows) this container alone doesn't do.
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_SECURE_COOKIE: "false" # fine for http://localhost; would need true behind real HTTPS
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  db_data:
  n8n_data:

# Embeddings: Ollama is intentionally NOT run here. It runs as a native
# arm64 binary + launchd service on the host instead -- see notes.md
# ("Embeddings: local via Ollama") for why the Docker route was abandoned
# (Docker Desktop VM disk corruption, then an exec format error even after
# a clean re-pull). Rails talks to it over HTTP at localhost:11434 either
# way, so nothing in the app code cares which one is running it.
